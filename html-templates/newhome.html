<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Home</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/newhome.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

    <div class="container">

        <!-- Product 1 -->
        <div class="product-container">

            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="">
            </div>

            <div class="product-details">

                <h3 class="product-name">
                    Nike Running Shoes for Men
                </h3>

                <div class="price">
                    ₹2,499
                </div>

                <div class="rating">

                    <div class="stars">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </div>

                    <span>(256 Reviews)</span>

                </div>

                <button>
                    View Details
                </button>

            </div>

        </div>


        <!-- Product 2 -->
        <div class="product-container">

            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="">
            </div>

            <div class="product-details">

                <h3 class="product-name">
                    Premium Smart Watch
                </h3>

                <div class="price">
                    ₹4,999
                </div>

                <div class="rating">

                    <div class="stars">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star-half-stroke"></i>
                        <i class="fa-regular fa-star"></i>
                    </div>

                    <span>(185 Reviews)</span>

                </div>

                <button>
                    View Details
                </button>

            </div>

        </div>


        <!-- Product 3 -->
        <div class="product-container">

            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500" alt="">
            </div>

            <div class="product-details">

                <h3 class="product-name">
                    Apple Smartphone
                </h3>

                <div class="price">
                    ₹69,999
                </div>

                <div class="rating">

                    <div class="stars">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                    </div>

                    <span>(520 Reviews)</span>

                </div>

                <button>
                    View Details
                </button>

            </div>

        </div>


        <!-- Product 4 -->
        <div class="product-container">

            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="">
            </div>

            <div class="product-details">

                <h3 class="product-name">
                    Wireless Bluetooth Headphones
                </h3>

                <div class="price">
                    ₹1,799
                </div>

                <div class="rating">

                    <div class="stars">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star-half-stroke"></i>
                        <i class="fa-regular fa-star"></i>
                    </div>

                    <span>(96 Reviews)</span>

                </div>

                <button>
                    View Details
                </button>

            </div>

        </div>

    </div>

</body>
</html>
