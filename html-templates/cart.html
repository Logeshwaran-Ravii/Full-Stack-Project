<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="./css/cart.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>

    <nav>

        <a href="home.html" class="logo">
            <h2>MyStore</h2>
        </a>

        <div class="search-box">

            <input type="text" placeholder="Search products...">

            <button>

                <i class="fa-solid fa-magnifying-glass"></i>

            </button>

        </div>

        <a href="login.html" class="login">

            Login

        </a>

        <a href="cart.html" class="cart">

            <i class="fa-solid fa-cart-shopping"></i>

            <span class="cart-count">3</span>

        </a>

    </nav>

</header>


<main>

<section class="cart-container">

    <div class="cart-item">

        <div class="product-image">

            <a href="productsDetails.html">

                <img
                src="images/wireless-headphones.jpg"
                alt="Wireless Headphones">

            </a>

        </div>

        <div class="product-details">

            <a href="productsDetails.html" class="product-name">

                Sony WH-CH520 Wireless Headphones

            </a>

            <p class="description">

                Lightweight Bluetooth headphones with 50 hours
                battery backup and premium sound quality.

            </p>

            <p class="price">

                ₹4,499

            </p>

            <div class="quantity">

                <button>-</button>

                <span>1</span>

                <button>+</button>

            </div>

            <button class="remove-btn">

                Remove

            </button>

        </div>

    </div>

</section>

</main>

<footer>

<p>© 2026 MyStore. All Rights Reserved.</p>

</footer>

</body>
</html>
